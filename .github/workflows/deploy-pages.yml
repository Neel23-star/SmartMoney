name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: smartmoney/frontend
        run: npm install

      - name: Build frontend
        working-directory: smartmoney/frontend
        env:
          VITE_API_URL: https://smartmoney-6mzt.onrender.com
        run: npm run build

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: smartmoney/frontend/dist
          name: github-pages

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
